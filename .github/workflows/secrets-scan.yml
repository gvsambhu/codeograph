name: Secret scan

# Runs gitleaks on every push and PR to catch accidentally committed secrets.
# Merges are blocked if any leak is detected (ADR-023, FR-21).
#
# To suppress a known-safe finding, add an allowlist entry to .gitleaks.toml
# rather than disabling this workflow.

on:
  push:
    branches: [main, "dev/**"]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required so gitleaks can scan every commit,
          # not just the files changed in this push.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
