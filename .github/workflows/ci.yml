name: CI

on:
  push:
    branches: [main, "dev/**"]
  pull_request:
    branches: [main]

env:
  TZ: UTC
  LC_ALL: C.UTF-8
  PYTHONHASHSEED: "0"

jobs:
  # ---------------------------------------------------------------------------
  # Python — unit (lint + typecheck + pytest unit)
  # ---------------------------------------------------------------------------
  unit:
    name: Python (unit)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Multi-OS extension hook: add 'windows-latest', 'macos-latest' here
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        shell: bash
        run: pip install -e ".[dev]"

      - name: Prompt artefact freshness (ADR-014)
        shell: bash
        run: |
          python scripts/gen_prompt_constants.py
          for f in codeograph/prompts/*/*.md; do
            python scripts/update_prompt_hash_pins.py "$f" || true
          done
          # Renderer-package prompts live under renderers/**/ (ADR-014, DC3)
          for f in codeograph/renderers/**/prompts/*/*.md; do
            python scripts/update_prompt_hash_pins.py "$f" || true
          done
          git diff --exit-code

      - name: Lint (ruff)
        shell: bash
        run: ruff check . && ruff format --check .

      - name: Banned-terms scan (NFR-1)
        shell: bash
        run: python scripts/check_banned_terms.py --repo

      - name: Type-check (mypy)
        shell: bash
        run: mypy codeograph/

      - name: Test (pytest — unit only)
        shell: bash
        run: pytest -m "not integration and not external" --tb=short

      - name: Golden tests (Tier 1)
        shell: bash
        run: pytest -m "tier1" --tb=short

  # ---------------------------------------------------------------------------
  # Python — integration tests requiring external dependencies (npx/mvn/tsc)
  # ---------------------------------------------------------------------------
  integration-external:
    name: Python (integration-external)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Multi-OS extension hook: add 'windows-latest', 'macos-latest' here
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        shell: bash
        run: pip install -e ".[dev]"
        
      - name: Compile parser JAR
        working-directory: codeograph/parser/java
        shell: bash
        run: mvn clean package -DskipTests --batch-mode --no-transfer-progress

      - name: Test (pytest — integration/external)
        shell: bash
        run: pytest -m "integration or external" --tb=short

  # ---------------------------------------------------------------------------
  # Eval — runs scorecards per corpus
  # ---------------------------------------------------------------------------
  eval:
    name: Eval (${{ matrix.corpus }})
    needs: [unit, integration-external]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Multi-OS extension hook: add 'windows-latest', 'macos-latest' here
        os: [ubuntu-latest]
        corpus: ["assignment", "spring-blog-api"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        shell: bash
        run: pip install -e ".[dev]"
        
      - name: Compile parser JAR
        working-directory: codeograph/parser/java
        shell: bash
        run: mvn clean package -DskipTests --batch-mode --no-transfer-progress

      - name: Run codeograph eval
        shell: bash
        run: |
          if [ -d "examples/${{ matrix.corpus }}" ]; then
            codeograph run examples/${{ matrix.corpus }} --eval --clean
          else
            echo "Skipping eval, examples/${{ matrix.corpus }} does not exist yet."
            mkdir -p examples/${{ matrix.corpus }}/out/evals
          fi

      - name: Upload scorecard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scorecards-${{ matrix.corpus }}-${{ matrix.os }}
          path: examples/${{ matrix.corpus }}/out/evals/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Eval Report — cross-corpus aggregation
  # ---------------------------------------------------------------------------
  report:
    name: Cross-corpus Eval Report
    needs: [eval]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        shell: bash
        run: pip install -e ".[dev]"

      - name: Download scorecard artifacts
        uses: actions/download-artifact@v4
        with:
          path: examples/
          pattern: scorecards-*
          merge-multiple: false

      - name: Run cross-corpus report
        shell: bash
        run: |
          # The downloaded artifacts are nested inside directories named after the artifact name.
          # e.g., examples/scorecards-assignment-ubuntu-latest/scorecard.graph.json
          # codeograph eval report expects output directories containing an 'evals/' directory
          # We need to restructure them.
          mkdir -p output_dirs
          for corpus in assignment spring-blog-api; do
            if [ -d "examples/scorecards-${corpus}-ubuntu-latest" ]; then
               mkdir -p output_dirs/${corpus}/evals
               cp -r examples/scorecards-${corpus}-ubuntu-latest/* output_dirs/${corpus}/evals/ 2>/dev/null || true
            fi
          done
          
          DIRS=$(find output_dirs/ -mindepth 1 -maxdepth 1 -type d)
          if [ -n "$DIRS" ]; then
            codeograph eval report $DIRS > eval-report.md
            cat eval-report.md
          else
            echo "No scorecards found to report on."
            echo "No scorecards found" > eval-report.md
          fi

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval-report.md

  # ---------------------------------------------------------------------------
  # Java — compile and test the parser JAR
  # ---------------------------------------------------------------------------
  java:
    name: Java (mvn test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Format check (spotless)
        working-directory: codeograph/parser/java
        shell: bash
        run: mvn spotless:check --batch-mode --no-transfer-progress

      - name: Test (mvn)
        working-directory: codeograph/parser/java
        shell: bash
        run: mvn test --batch-mode --no-transfer-progress
