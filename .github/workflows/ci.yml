name: CI

on:
  push:
    branches: [main, "dev/**"]
  pull_request:
    branches: [main]

# Reproducibility envelope (ADR-007 §8): deterministic timezone, locale, and
# hash seed so golden-graph byte comparisons are stable across runs and machines.
env:
  TZ: UTC
  LC_ALL: C.UTF-8
  PYTHONHASHSEED: "0"

jobs:
  # ---------------------------------------------------------------------------
  # Python — lint, type-check, test
  # ---------------------------------------------------------------------------
  python:
    name: Python (lint + typecheck + pytest)
    # Pin OS for reproducibility (ADR-007 §8 reproducibility envelope).
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Prompt artefact freshness (ADR-014)
        # Regenerate _prompts_generated.py and re-pin every prompt's content_hash_pin.
        # If a contributor edited a prompt without running pre-commit (or bypassed
        # hooks), the working tree will diff and this step fails. Catches stale
        # generated code and stale hash pins before they reach main.
        run: |
          python scripts/gen_prompt_constants.py
          for f in codeograph/prompts/*/*.md; do
            python scripts/update_prompt_hash_pins.py "$f" || true
          done
          git diff --exit-code

      - name: Lint (ruff)
        run: ruff check . && ruff format --check .

      - name: Banned-terms scan (NFR-1)
        # Full-tree scan honouring .banned-terms-allowlist.txt and per-line
        # `banned-terms: ok` pragmas. Catches leaks that bypass the local
        # pre-commit hook (e.g., contributor without hooks installed, or a
        # term added via a tool that doesn't run pre-commit like gh web UI).
        run: python scripts/check_banned_terms.py --repo

      - name: Type-check (mypy)
        run: mypy codeograph/

      - name: Test (pytest — unit only)
        # Exclude integration tests: those require a live JVM + parser.jar
        # and run in the separate 'java' job below.
        run: pytest -m "not integration" --tb=short

      - name: Golden tests (Tier 1)
        # Surgical fixture — regex-fallback mode (no JVM needed here).
        # Fails only when _assert_golden is implemented (Issue #6 M11 TODO).
        # Run after unit tests so a unit failure surfaces first.
        run: pytest -m "tier1" --tb=short

  # ---------------------------------------------------------------------------
  # Java — compile and test the parser JAR
  # ---------------------------------------------------------------------------
  java:
    name: Java (mvn test)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          # Cache Maven's local repository so JUnit + JavaParser deps aren't
          # re-downloaded on every run.
          cache: maven

      - name: Format check (spotless)
        working-directory: codeograph/parser/java
        run: mvn spotless:check --batch-mode --no-transfer-progress

      - name: Test (mvn)
        working-directory: codeograph/parser/java
        run: mvn test --batch-mode --no-transfer-progress
