repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: update-prompt-hash-pins
        name: Update Prompt Hash Pins
        entry: python scripts/update_prompt_hash_pins.py
        language: system
        files: ^codeograph/prompts/.*\.md$
        pass_filenames: true
      - id: gen-prompt-constants
        name: Generate Prompt Constants
        entry: python scripts/gen_prompt_constants.py
        language: system
        pass_filenames: false
        always_run: true
      - id: banned-terms-files
        name: Banned terms (staged files)
        entry: python scripts/check_banned_terms.py --files
        language: system
        pass_filenames: true
        # Skip the term list, allowlist, and the scanner itself — they all
        # legitimately mention the terms. Honoured by the scanner's own
        # allowlist too, but excluded here so the hook never even invokes.
        exclude: ^(\.banned-terms\.txt|\.banned-terms-allowlist\.txt|scripts/check_banned_terms\.py)$
      - id: banned-terms-commit-msg
        name: Banned terms (commit message)
        entry: python scripts/check_banned_terms.py --commit-msg
        language: system
        stages: [commit-msg]
        pass_filenames: true
